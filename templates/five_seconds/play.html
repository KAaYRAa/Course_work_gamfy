{% load static %}
<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>5 секунд — Gamfy</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    
    <link rel="stylesheet" href="{% static 'five_seconds/five_seconds.css' %}">
</head>
<body class="bg-[#0f0f0f] min-h-screen text-white flex flex-col items-center justify-center p-6 font-sans">
    {% csrf_token %}

    <a href="{% url 'games:home' %}" class="absolute top-10 left-10 text-white/30 hover:text-white text-[10px] uppercase tracking-widest transition-all">← На головну</a>

    <div id="setup" class="w-full max-w-md bg-white/5 p-10 rounded-[40px] border border-white/10 shadow-2xl">
        <h2 class="text-center text-[10px] uppercase tracking-[0.4em] mb-10 opacity-50">Налаштування гри</h2>
        
        <div class="space-y-6 mb-10 text-left">
            <div>
                <label class="block text-[9px] uppercase tracking-widest opacity-30 mb-2 ml-4">Час на відповідь</label>
                <select id="timer-choice" class="w-full bg-white/5 border border-white/10 rounded-2xl px-6 py-4 outline-none focus:border-yellow-500/40 appearance-none font-bold">
                    <option value="5" class="bg-[#1a1a1a]">5 секунд</option>
                    <option value="10" class="bg-[#1a1a1a]">10 секунд</option>
                </select>
            </div>

            <div>
                <label class="block text-[9px] uppercase tracking-widest opacity-30 mb-2 ml-4">Балів для перемоги</label>
                <input type="number" id="win-score" value="5" class="w-full bg-white/5 border border-white/10 rounded-2xl px-6 py-4 outline-none focus:border-yellow-500/40 font-bold">
            </div>

            <div id="p-inputs" class="space-y-3">
                <label class="block text-[9px] uppercase tracking-widest opacity-30 mb-2 ml-4">Учасники</label>
                <input type="text" class="p-name w-full bg-white/5 border border-white/10 rounded-2xl px-6 py-4 outline-none" placeholder="Гравець 1">
                <input type="text" class="p-name w-full bg-white/5 border border-white/10 rounded-2xl px-6 py-4 outline-none" placeholder="Гравець 2">
            </div>
        </div>

        <button onclick="addPlayerInput()" class="w-full text-[9px] uppercase tracking-widest opacity-30 hover:opacity-100 mb-8">+ Додати гравця</button>
        <button onclick="startGame()" class="w-full bg-yellow-500 text-black py-5 rounded-full font-black uppercase tracking-widest text-[11px] hover:scale-105 active:scale-95 transition-all shadow-lg">Готово</button>
    </div>

    <div id="game" class="hidden w-full max-w-2xl text-center">
        <div id="timer-container" class="relative w-32 h-32 mx-auto mb-12 flex items-center justify-center border-4 border-white/10 rounded-full transition-colors">
            <div id="timer-text" class="text-5xl font-black italic">5</div>
        </div>

        <div class="bg-white/5 p-12 rounded-[50px] border border-white/10 mb-12 shadow-2xl relative overflow-hidden">
            <h3 id="current-player-display" class="text-[10px] uppercase tracking-[0.5em] text-yellow-500 mb-8">Зараз відповідає: </h3>
            <div id="question-card" class="text-4xl font-bold tracking-tight mb-4 min-h-[120px] flex items-center justify-center">...</div>
            <div id="progress-line" class="absolute bottom-0 left-0 h-1 bg-yellow-500 progress-bar" style="width: 100%;"></div>
        </div>

        <div id="controls" class="flex gap-4">
            <button onclick="handleAnswer(false)" class="flex-1 bg-white/5 border border-white/10 py-6 rounded-[30px] uppercase text-[10px] tracking-widest font-bold hover:bg-red-600/20 transition-all">Не встиг</button>
            <button onclick="handleAnswer(true)" class="flex-1 bg-white text-black py-6 rounded-[30px] uppercase text-[10px] tracking-widest font-black hover:scale-105 transition-all">Встиг!</button>
        </div>
    </div>

    <div id="finish" class="hidden text-center w-full max-w-md">
        <h2 class="text-7xl font-black mb-4 uppercase italic text-yellow-500">Фінал</h2>
        <p id="winner-text" class="text-white/40 mb-12 uppercase tracking-[0.3em] text-[10px]">...</p>
        
        <div id="stats-table" class="bg-white/5 p-8 rounded-[40px] border border-white/10 space-y-4 mb-10"></div>
        <button onclick="location.reload()" class="bg-white text-black px-12 py-5 rounded-full font-black uppercase text-[10px] tracking-widest hover:scale-110 transition-all">Нова гра</button>
    </div>

    <script>

        window.FIVESEC_GET_QUESTIONS_URL = "{% url 'five_seconds:get_questions' %}";
        window.FIVESEC_VALIDATE_URL = "/five_seconds/validate-answer/";
        window.FIVESEC_START_TIMER_URL = "/five_seconds/start-timer/";
    </script>

    <script src="{% static 'five_seconds/five_seconds.js' %}"></script>
</body>
</html>
