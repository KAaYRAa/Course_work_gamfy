{% load static %}
<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Мафія — Gamfy</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    
    <link rel="stylesheet" href="{% static 'mafia/mafia.css' %}">
</head>
<body class="bg-[#0a0a0a] min-h-screen text-white flex flex-col items-center justify-center p-6 font-sans overflow-hidden">
    {% csrf_token %}

    <a href="{% url 'games:home' %}" class="absolute top-10 left-10 text-white/30 hover:text-white text-[10px] uppercase tracking-[0.3em] transition-all z-50">
        ← На головну
    </a>

    <div id="setup" class="w-full max-w-md bg-[#1a0101]/60 p-10 rounded-[40px] border border-white/5 shadow-2xl">
        <h2 class="text-center text-[10px] uppercase tracking-[0.4em] mb-10 text-white/40 font-bold">Налаштування ролей</h2>
        <div class="space-y-3 mb-10">
            <div class="flex justify-between items-center bg-white/5 p-4 rounded-[20px] border border-white/5">
                <span class="text-[10px] uppercase tracking-widest opacity-60">Мирні жителі</span>
                <input type="number" id="count-civil" value="4" class="bg-transparent w-10 text-center outline-none border-b border-white/20 font-bold">
            </div>
            <div class="flex justify-between items-center bg-white/5 p-4 rounded-[20px] border border-red-900/20 text-red-500">
                <span class="text-[10px] uppercase tracking-widest font-bold">Мафія</span>
                <input type="number" id="count-mafia" value="2" class="bg-transparent w-10 text-center outline-none border-b border-red-500/20 font-bold">
            </div>
            <div class="flex justify-between items-center bg-white/5 p-4 rounded-[20px] border border-blue-900/20 text-blue-400">
                <span class="text-[10px] uppercase tracking-widest font-bold">Шериф</span>
                <input type="number" id="count-sheriff" value="1" class="bg-transparent w-10 text-center outline-none border-b border-blue-400/20 font-bold">
            </div>
            <div class="flex justify-between items-center bg-white/5 p-4 rounded-[20px] border border-green-900/20 text-green-400">
                <span class="text-[10px] uppercase tracking-widest font-bold">Лікар</span>
                <input type="number" id="count-doctor" value="1" class="bg-transparent w-10 text-center outline-none border-b border-green-400/20 font-bold">
            </div>
        </div>
        <button onclick="distributeRoles()" class="w-full bg-white text-black py-5 rounded-full font-black uppercase tracking-[0.2em] text-[11px] shadow-xl hover:scale-105 active:scale-95 transition-all">
            Готово
        </button>
    </div>

    <div id="role-reveal" class="hidden flex flex-col items-center">
        <h2 id="player-label" class="text-3xl font-light mb-12 tracking-[0.2em] uppercase">Гравець 1</h2>
        <div id="role-card" class="w-72 h-[450px] bg-[#1a0101] rounded-[40px] border border-white/10 flex items-center justify-center cursor-pointer hover:border-white/30 transition-all relative shadow-2xl group" onclick="revealRole()">
            <div id="card-front" class="text-center p-8">
                <div class="w-16 h-16 bg-white/5 rounded-full mx-auto mb-6 flex items-center justify-center">
                    <span class="text-white/20 text-2xl">?</span>
                </div>
                <p class="text-[9px] uppercase tracking-[0.4em] text-white/30 leading-relaxed">Натисніть на картку,<br>щоб побачити свою роль</p>
            </div>
            <div id="card-back" class="hidden absolute inset-0 flex flex-col items-center justify-center bg-white text-black rounded-[40px] p-8">
                <p class="text-[10px] uppercase font-bold tracking-[0.3em] mb-4 opacity-40">Твоя роль</p>
                <h3 id="role-name" class="text-4xl font-black uppercase tracking-tighter text-center">...</h3>
            </div>
        </div>
        <button id="next-player-btn" onclick="nextPlayer()" class="hidden mt-12 bg-white/5 border border-white/10 px-12 py-5 rounded-full uppercase text-[10px] tracking-[0.3em] hover:bg-white/10 transition-all">
            Наступний гравець →
        </button>
    </div>

    <div id="game-flow" class="hidden w-full max-w-5xl text-center flex flex-col items-center">
        <h2 id="phase-title" class="text-7xl font-light mb-4 tracking-tighter uppercase">Ніч 1</h2>
        <div id="timer" class="text-9xl font-mono mb-8 text-red-600 font-bold tracking-tighter">01:00</div>
        <p id="phase-desc" class="text-white/30 uppercase text-[10px] tracking-[0.4em] mb-16">Знайомство гравців з ведучим</p>
        
        <div id="alive-players" class="grid grid-cols-2 md:grid-cols-4 gap-6 w-full max-h-[40vh] overflow-y-auto p-4 custom-scrollbar"></div>
        
        <button id="next-phase-btn" class="hidden mt-12 bg-white text-black px-16 py-6 rounded-full font-black uppercase text-[11px] tracking-[0.2em] shadow-2xl hover:scale-105 transition-all"></button>
    </div>

    <div id="finish" class="hidden text-center flex flex-col items-center">
        <h2 id="winner-title" class="text-8xl font-black mb-4 uppercase tracking-tighter">ПЕРЕМОГА</h2>
        <p id="winner-reason" class="text-white/40 mb-16 uppercase tracking-[0.3em] text-[10px]"></p>
        
        <div id="final-roles" class="bg-[#1a0101]/60 p-10 rounded-[50px] border border-white/5 mb-16 w-full max-w-lg">
            <h3 class="text-[9px] uppercase tracking-[0.5em] mb-8 opacity-20 text-center font-bold">Розподіл ролей</h3>
            <div id="roles-list" class="space-y-4"></div>
        </div>

        <button onclick="location.reload()" class="bg-white text-black px-20 py-6 rounded-full font-black uppercase tracking-[0.2em] text-[11px] hover:scale-105 transition-all">
            Нова партія
        </button>
    </div>

    <script>
        window.MAFIA_DISTRIBUTE_URL = "{% url 'mafia:distribute_roles' %}";
    </script>

    <script src="{% static 'mafia/mafia.js' %}"></script>
</body>
</html>
