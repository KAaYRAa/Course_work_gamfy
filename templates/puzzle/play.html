{% load static %}
<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Пазл — Gamfy</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    
    <link rel="stylesheet" href="{% static 'puzzle/puzzle.css' %}">
</head>
<body class="bg-[#05161a] min-h-screen text-white flex flex-col items-center justify-center p-6 font-sans text-center">

    {% csrf_token %} 
    <a href="{% url 'games:home' %}" class="absolute top-10 left-10 text-white/30 hover:text-white text-[10px] uppercase tracking-[0.3em] transition-all z-50">
        ← На головну
    </a>

    <div id="setup" class="w-full max-w-md bg-[#0a1f24] p-10 rounded-[40px] border border-white/5 shadow-2xl">
        <h2 class="text-[10px] uppercase tracking-[0.4em] mb-10 opacity-50 font-bold">Налаштування гри</h2>
        <div class="space-y-6 mb-8">
            <div>
                <label class="block text-[9px] uppercase tracking-widest opacity-30 mb-2 ml-4 text-left">Балів для перемоги</label>
                <input type="number" id="win-score" value="10" class="w-full bg-white/5 border border-white/10 rounded-2xl px-6 py-4 outline-none focus:border-cyan-500/40 transition-all font-bold">
            </div>
            <div id="p-inputs" class="space-y-3 text-left">
                <label class="block text-[9px] uppercase tracking-widest opacity-30 mb-2 ml-4">Учасники</label>
                <input type="text" class="p-name w-full bg-white/5 border border-white/10 rounded-2xl px-6 py-4 outline-none focus:border-cyan-500/30 transition-all" placeholder="Гравець 1">
                <input type="text" class="p-name w-full bg-white/5 border border-white/10 rounded-2xl px-6 py-4 outline-none focus:border-cyan-500/30 transition-all" placeholder="Гравець 2">
            </div>
        </div>
        <button onclick="addPlayerInput()" class="w-full text-[9px] uppercase tracking-[0.3em] opacity-30 hover:opacity-100 mb-10 transition-all">+ Додати учасника</button>
        <button onclick="startGame()" class="w-full bg-white text-black py-6 rounded-full font-black uppercase tracking-[0.2em] text-[11px] shadow-xl hover:scale-105 active:scale-95 transition-all">Почати</button>
    </div>

    <div id="game" class="hidden w-full max-w-2xl">
        <div class="mb-8">
            <h3 id="current-player" class="text-xl uppercase tracking-[0.5em] text-cyan-400 mb-2 font-bold">Зараз ходить: ...</h3>
            <div id="score-info" class="text-[12px] uppercase opacity-60 tracking-[0.3em] font-bold">Балів за вгадування: 5</div>
            <div id="total-progress" class="text-[9px] uppercase opacity-20 mt-2">Ціль: 10 балів</div>
        </div>

        <div id="puzzle-matrix-container" class="grid grid-cols-3 gap-4 w-full aspect-square max-w-[400px] mx-auto mb-8 bg-black/20 p-4 rounded-[30px] border border-white/5"></div>

        <div class="flex flex-col gap-4 max-w-[400px] mx-auto">
            <div class="flex gap-4">
                <button id="hint-btn" onclick="revealRandomMatrixCell()" class="flex-1 bg-white/5 border border-white/10 py-5 rounded-[20px] uppercase text-[10px] tracking-[0.2em] font-bold hover:bg-white/10 transition-all">
                    Відкрити пазл
                </button>
                <button onclick="showGuessInput()" class="flex-1 bg-cyan-600 text-white py-5 rounded-[20px] uppercase text-[10px] tracking-[0.2em] font-black shadow-lg hover:bg-cyan-500 transition-all">
                    Вгадати слово
                </button>
            </div>
            
            <div id="guess-input-block" class="hidden flex gap-3 mt-2">
                <input type="text" id="guess-text" class="flex-1 bg-white/10 border border-white/10 rounded-[15px] px-6 py-3 outline-none focus:border-cyan-500/50 transition-all uppercase tracking-widest text-xs" placeholder="Ваша відповідь...">
                <button onclick="checkGuess()" class="bg-white text-black px-8 py-3 rounded-[15px] uppercase text-[10px] font-black hover:scale-105 transition-all">ОК</button>
            </div>
        </div>
    </div>

    <div id="finish" class="hidden flex flex-col items-center">
        <h2 class="text-8xl font-black mb-4 uppercase tracking-tighter text-cyan-500">Фінал</h2>
        <p id="winner-announce" class="text-white/40 mb-16 uppercase tracking-[0.3em] text-[10px]">ПЕРЕМІГ ...!</p>
        <div class="bg-white/5 p-10 rounded-[50px] border border-white/5 mb-16 w-full max-w-md">
            <h3 class="text-[9px] uppercase tracking-[0.5em] mb-8 opacity-20 font-bold">Результати матчу</h3>
            <div id="final-table" class="space-y-4"></div>
        </div>
        <button onclick="location.reload()" class="bg-white text-black px-20 py-6 rounded-full font-black uppercase tracking-[0.2em] text-[11px] hover:scale-105 transition-all">Нова гра</button>
    </div>

    <script>
        window.PUZZLE_GET_DATA_URL = "{% url 'puzzle:get_data' %}";
        window.PUZZLE_CHECK_GUESS_URL = "/puzzle/check-guess/";
    </script>

    <script src="{% static 'puzzle/puzzle.js' %}"></script>
</body>
</html>
